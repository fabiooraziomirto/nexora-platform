site_name: Stack4Things SDK
site_description: Python SDK for Stack4Things v2.0
site_url: https://stack4things.github.io/sdk

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - API Reference:
    - REST API: api/README.md
    - gRPC: grpc/README.md
  - Examples:
    - Basic Usage: examples/basic.md
    - Authentication: examples/auth.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite

