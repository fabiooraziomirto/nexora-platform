<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ title }} - Login</title>
  <style>body{font-family:Arial,sans-serif;margin:2rem;max-width:900px} input,button{padding:.6rem;width:100%;margin:.4rem 0} .muted{color:#666}</style>
</head>
<body>
  <h1>{{ title }}</h1>
  <p class="muted">Compat dashboard for Stack4Things v2 (IoTronic functional mapping).</p>
  <p>Keycloak endpoint: <code>{{ keycloak_url }}/realms/{{ realm }}</code></p>
  <form method="post" action="/login">
    <label>Bearer token</label>
    <input name="token" value="{{ default_token }}" placeholder="paste JWT token" required />
    <button type="submit">Enter dashboard</button>
  </form>
</body>
</html>
