<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ title }} - Login</title>
  <style>body{font-family:Arial,sans-serif;margin:2rem;max-width:900px} input,button{padding:.6rem;width:100%;margin:.4rem 0} .muted{color:#666}.err{color:#a00;font-weight:600}</style>
</head>
<body>
  <h1>{{ title }}</h1>
  <p class="muted">Compat dashboard for Stack4Things v2 (IoTronic functional mapping).</p>
  <p>Keycloak endpoint: <code>{{ keycloak_url }}/realms/{{ realm }}</code></p>
  {% if error %}<p class="err">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label>Username</label>
    <input name="username" value="{{ default_username }}" placeholder="username" required />
    <label>Password</label>
    <input type="password" name="password" value="{{ default_password }}" placeholder="password" required />
    <button type="submit">Enter dashboard</button>
  </form>
</body>
</html>
