# Alembic configuration file for MySQL/MariaDB

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# MySQL connection string
# Format: mysql+pymysql://user:password@host:port/database
# For local development: mysql+pymysql://stack4things:stack4things@localhost:3306/stack4things
# For Kubernetes: mysql+pymysql://stack4things:stack4things@proxysql.stack4things-infrastructure.svc.cluster.local:3306/stack4things
sqlalchemy.url = mysql+pymysql://user:password@localhost:3306/stack4things

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

