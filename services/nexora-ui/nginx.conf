server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend services
    location /api/v2/devices {
        proxy_pass http://nxr-device-service:8000;
        proxy_set_header Host $host;
    }

    location /api/v2/plugins {
        proxy_pass http://nxr-plugin-service:8000;
        proxy_set_header Host $host;
    }

    location /api/v2/functions {
        proxy_pass http://nxr-plugin-service:8000;
        proxy_set_header Host $host;
    }

    location /api/v2/executions {
        proxy_pass http://nxr-execution-service:8000;
        proxy_set_header Host $host;
    }

    location /api/v2/ports {
        proxy_pass http://nxr-network-service:8000;
        proxy_set_header Host $host;
    }

    location /api/v2/webservices {
        proxy_pass http://nxr-webservice-service:8000;
        proxy_set_header Host $host;
    }

    location /api/v2/fleets {
        proxy_pass http://nxr-fleet-service:8000;
        proxy_set_header Host $host;
    }

    location /api/v2/audit {
        proxy_pass http://nxr-device-service:8000;
        proxy_set_header Host $host;
    }

    location /api/v2/ai {
        proxy_pass http://nxr-ai-pipeline-service:8000;
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
