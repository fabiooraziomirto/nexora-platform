name: OpenAPI Contract Governance

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  openapi-contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install openapi-diff
        run: |
          npm install -g @redocly/cli

      - name: Validate OpenAPI files
        run: |
          if ls docs/openapi/*.yaml >/dev/null 2>&1; then
            for f in docs/openapi/*.yaml; do
              redocly lint "$f"
            done
          else
            echo "No OpenAPI files found in docs/openapi; skipping."
          fi
