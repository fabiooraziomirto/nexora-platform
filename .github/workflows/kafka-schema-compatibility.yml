name: Kafka Schema Compatibility

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  schema-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate schema files
        run: |
          if ls docs/schemas/*.json >/dev/null 2>&1; then
            for f in docs/schemas/*.json; do
              python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
            done
          else
            echo "No schema files found in docs/schemas; skipping."
          fi
