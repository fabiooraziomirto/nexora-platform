name: SDK Stability

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  sdk-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: SDK lint/test/typecheck
        working-directory: libraries/sdk
        run: |
          poetry install --no-interaction --no-ansi
          poetry run ruff check .
          poetry run pytest -q
          poetry run mypy src
