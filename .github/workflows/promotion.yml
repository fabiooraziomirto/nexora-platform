name: Environment Promotion

on:
  workflow_dispatch:
    inputs:
      from_env:
        description: "Source environment"
        required: true
        default: "dev"
      to_env:
        description: "Target environment"
        required: true
        default: "staging"

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.to_env }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate promotion path
        run: |
          FROM="${{ github.event.inputs.from_env }}"
          TO="${{ github.event.inputs.to_env }}"
          if [ "$FROM" = "$TO" ]; then
            echo "from_env and to_env cannot be equal"
            exit 1
          fi
          echo "Promoting from $FROM to $TO"

      - name: Execute rollback-safe promotion
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > kubeconfig
          export KUBECONFIG="$PWD/kubeconfig"
          kubectl apply -f infrastructure/kubernetes/
          kubectl rollout status deployment/device-service -n stack4things --timeout=120s
          kubectl rollout status deployment/plugin-service -n stack4things --timeout=120s
          kubectl get pods -n stack4things
