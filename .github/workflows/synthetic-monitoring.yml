name: Synthetic Monitoring

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  synthetic-checks:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.STACK4THINGS_SYNTHETIC_BASE_URL }}
      SYNTHETIC_ENABLED: ${{ secrets.STACK4THINGS_SYNTHETIC_ENABLED }}
    steps:
      - name: Basic uptime checks
        run: |
          set -euo pipefail
          # Feature flag: keep synthetic monitoring disabled by default to avoid
          # noisy failures while developing (flip the secret to "true" to enable).
          if [ "${SYNTHETIC_ENABLED:-}" != "true" ]; then
            echo "Synthetic monitoring skipped: SYNTHETIC_ENABLED secret is not set to 'true'."
            exit 0
          fi
          if [ -z "${BASE_URL}" ]; then
            echo "Synthetic monitoring skipped: STACK4THINGS_SYNTHETIC_BASE_URL secret is empty/missing."
            exit 0
          fi
          for url in \
            "${BASE_URL}/api/v2/devices" \
            "${BASE_URL}/api/v2/plugins" \
            "${BASE_URL}/api/v2/executions" \
            "${BASE_URL}/api/v2/ports"; do
            status="$(curl -sS -o /dev/null -w "%{http_code}" "$url" || true)"
            echo "Check $url -> HTTP $status"
            # If auth is enabled, these endpoints commonly return 401/403 to unauthenticated synthetic checks.
            # We still want to detect outages/5xx, so we treat 401/403 as "reachable".
            if [ "$status" != "200" ] && [ "$status" != "401" ] && [ "$status" != "403" ]; then
              echo "Synthetic check failed for $url with HTTP $status"
              exit 1
            fi
          done
