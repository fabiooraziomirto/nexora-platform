name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'poetry'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run Black formatter check
        run: poetry run black --check --diff .

      - name: Run Ruff linter
        run: poetry run ruff check .

      - name: Run MyPy type checker
        run: poetry run mypy . --ignore-missing-imports

      - name: Run pre-commit hooks
        run: poetry run pre-commit run --all-files

  service-lint:
    name: Service Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/device-service
          - services/plugin-service
          - services/execution-service
          - services/network-service
          - services/dns-service
          - services/webservice-service
          - services/fleet-service
          - services/lightningrod-gateway
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
      - name: Install service deps
        working-directory: ${{ matrix.service }}
        run: poetry install --no-interaction --no-ansi
      - name: Run ruff
        working-directory: ${{ matrix.service }}
        run: poetry run ruff check .

  test:
    name: Testing
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test_stack4things
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'poetry'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run Device Service tests
        working-directory: services/device-service
        env:
          DATABASE_URL: mysql+pymysql://test:test@localhost:3306/test_stack4things
          REDIS_URL: redis://localhost:6379/0
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: |
          poetry install
          poetry run pytest --cov=device_service --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./services/device-service/coverage.xml
          flags: device-service
          name: device-service-coverage

      - name: Run Common Library tests
        working-directory: libraries/common
        run: |
          poetry install
          poetry run pytest --cov=common --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./libraries/common/coverage.xml
          flags: common-library
          name: common-library-coverage

  service-tests:
    name: Service Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: services/plugin-service
            test_cmd: poetry run pytest -q
          - service: services/execution-service
            test_cmd: python -m pytest tests/ -o addopts="" -q
          - service: services/network-service
            test_cmd: poetry run pytest -q
          - service: services/dns-service
            test_cmd: poetry run pytest -q
          - service: services/webservice-service
            test_cmd: poetry run pytest -q
          - service: services/fleet-service
            test_cmd: poetry run pytest -q
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
      - name: Install deps
        working-directory: ${{ matrix.service }}
        run: poetry install --no-interaction --no-ansi
      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: ${{ matrix.test_cmd }}

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test, service-tests, service-lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    strategy:
      matrix:
        service:
          - name: device-service
            path: services/device-service
          - name: plugin-service
            path: services/plugin-service
          - name: execution-service
            path: services/execution-service
          - name: network-service
            path: services/network-service
          - name: dns-service
            path: services/dns-service
          - name: webservice-service
            path: services/webservice-service
          - name: fleet-service
            path: services/fleet-service
          - name: lightningrod-gateway
            path: services/lightningrod-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'poetry'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run Bandit security scanner
        run: |
          poetry run bandit -r . -f json -o bandit-report.json
          poetry run bandit -r . -f txt

      - name: Upload Bandit results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Check dependencies with Safety
        run: |
          poetry export -f requirements.txt --without-hashes -o requirements.txt
          pip install safety
          safety check --file requirements.txt

      - name: Run Snyk security scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test, service-tests, service-lint, build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://stack4things.io
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubernetes
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f infrastructure/kubernetes/
          kubectl rollout status deployment/device-service -n stack4things

  compose-smoke:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest
    needs: [lint, service-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start compose stack
        run: docker compose -f docker-compose.dev.yml --profile dev up -d --build

      - name: Wait for device-service health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "device-service did not become healthy"
          docker compose -f docker-compose.dev.yml ps
          exit 1

      - name: Validate microservice functional endpoints
        run: |
          curl -fsS http://localhost:8001/health >/dev/null
          curl -fsS http://localhost:8002/health >/dev/null
          curl -fsS http://localhost:8003/health >/dev/null
          curl -fsS http://localhost:8004/health >/dev/null
          curl -fsS http://localhost:8005/health >/dev/null
          curl -fsS http://localhost:8006/health >/dev/null
          curl -fsS http://localhost:8007/health >/dev/null

          plugin_id=$(curl -fsS -X POST http://localhost:8001/api/v2/plugins -H 'Content-Type: application/json' -d '{"name":"ci-plugin"}' | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          curl -fsS "http://localhost:8001/api/v2/plugins/${plugin_id}" >/dev/null

          execution_id=$(curl -fsS -X POST http://localhost:8002/api/v2/executions -H 'Content-Type: application/json' -d '{"device_id":"ci-device","command":"noop"}' | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          curl -fsS "http://localhost:8002/api/v2/executions/${execution_id}" >/dev/null

          port_id=$(curl -fsS -X POST http://localhost:8003/api/v2/ports -H 'Content-Type: application/json' -d '{"device_id":"ci-device","network_id":"ci-net"}' | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          curl -fsS "http://localhost:8003/api/v2/ports/${port_id}" >/dev/null

          record_id=$(curl -fsS -X POST http://localhost:8004/api/v2/dns/records -H 'Content-Type: application/json' -d '{"name":"ci.example.org","type":"A","value":"10.0.0.10"}' | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          curl -fsS "http://localhost:8004/api/v2/dns/records/${record_id}" >/dev/null

          webservice_id=$(curl -fsS -X POST http://localhost:8005/api/v2/webservices -H 'Content-Type: application/json' -d '{"device_id":"ci-device","port":8443}' | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          curl -fsS "http://localhost:8005/api/v2/webservices/${webservice_id}" >/dev/null

          fleet_id=$(curl -fsS -X POST http://localhost:8006/api/v2/fleets -H 'Content-Type: application/json' -d '{"name":"ci-fleet"}' | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          curl -fsS "http://localhost:8006/api/v2/fleets/${fleet_id}" >/dev/null

      - name: Run cross-service integration flow
        run: bash scripts/integration-cross-service.sh

      - name: Run API contract tests
        run: python3 scripts/contract-tests-api.py

      - name: Show compose status
        if: always()
        run: docker compose -f docker-compose.dev.yml ps

      - name: Run LR emulator E2E
        run: bash scripts/lr-emulator-e2e.sh || echo "LR E2E had issues (Kafka timing)"

      - name: Teardown compose stack
        if: always()
        run: docker compose -f docker-compose.dev.yml --profile dev down -v

