name: Post-Alpha Validation Suite

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  postalpha-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Docker Compose dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Make scripts executable
        run: |
          chmod +x scripts/postalpha-validation.sh \
            scripts/contract-tests-api.py \
            scripts/integration-cross-service.sh \
            scripts/chaos-drill.sh \
            scripts/backup-restore-validate.sh

      - name: Run post-alpha validation suite
        run: bash scripts/postalpha-validation.sh
