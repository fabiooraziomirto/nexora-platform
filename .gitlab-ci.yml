# GitLab CI/CD Pipeline for Stack4Things v2.0

stages:
  - lint
  - test
  - build
  - security
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POETRY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/poetry"
  PYTHON_VERSION: "3.11"

# Cache configuration
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip/
    - .cache/poetry/
    - .venv/

# Base image for Python jobs
.python_base: &python_base
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl git build-essential
    - pip install poetry==1.7.1
    - poetry config virtualenvs.create false
    - poetry config virtualenvs.in-project true
    - poetry install --no-interaction --no-ansi

# Linting Stage
lint:black:
  <<: *python_base
  stage: lint
  script:
    - echo "Running Black formatter check..."
    - poetry run black --check --diff .
  only:
    - merge_requests
    - main
    - develop

lint:ruff:
  <<: *python_base
  stage: lint
  script:
    - echo "Running Ruff linter..."
    - poetry run ruff check .
  only:
    - merge_requests
    - main
    - develop

lint:mypy:
  <<: *python_base
  stage: lint
  script:
    - echo "Running MyPy type checker..."
    - poetry run mypy . --ignore-missing-imports || true
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

lint:pre-commit:
  <<: *python_base
  stage: lint
  script:
    - echo "Running pre-commit hooks..."
    - poetry run pre-commit run --all-files
  only:
    - merge_requests
    - main
    - develop

# Testing Stage
test:device-service:
  <<: *python_base
  stage: test
  services:
    - mysql:8.0
    - redis:7-alpine
  variables:
    MYSQL_ROOT_PASSWORD: test
    MYSQL_DATABASE: test_stack4things
    MYSQL_USER: test
    MYSQL_PASSWORD: test
    REDIS_URL: redis://redis:6379/0
    DATABASE_URL: mysql+pymysql://test:test@mysql:3306/test_stack4things
    KAFKA_BOOTSTRAP_SERVERS: localhost:9092
  before_script:
    - *python_base
    - apt-get update -qq && apt-get install -y -qq default-libmysqlclient-dev pkg-config
  script:
    - echo "Running Device Service tests..."
    - cd services/device-service
    - poetry install
    - poetry run pytest --cov=device_service --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: services/device-service/coverage.xml
    paths:
      - services/device-service/htmlcov/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

test:common-library:
  <<: *python_base
  stage: test
  script:
    - echo "Running Common Library tests..."
    - cd libraries/common
    - poetry install
    - poetry run pytest --cov=common --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: libraries/common/coverage.xml
  only:
    - merge_requests
    - main
    - develop

# Build Stage
build:device-service:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_IMAGE_TAG: $CI_REGISTRY_IMAGE/device-service:$CI_COMMIT_SHORT_SHA
    DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE/device-service:latest
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - docker buildx create --use --name multiarch-builder
    - docker buildx inspect --bootstrap
  script:
    - echo "Building Device Service Docker image (multi-arch)..."
    - cd services/device-service
    - docker buildx build --platform linux/amd64,linux/arm64 -t $DOCKER_IMAGE_TAG -t $DOCKER_IMAGE_LATEST --push .
  only:
    - main
    - develop
    - tags

build:common-library:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_IMAGE_TAG: $CI_REGISTRY_IMAGE/common:$CI_COMMIT_SHORT_SHA
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - docker buildx create --use --name multiarch-builder
    - docker buildx inspect --bootstrap
  script:
    - echo "Building Common Library Docker image (multi-arch)..."
    - cd libraries/common
    - docker buildx build --platform linux/amd64,linux/arm64 -t $DOCKER_IMAGE_TAG --push .
  only:
    - main
    - develop
    - tags

# Security Scanning Stage
security:bandit:
  <<: *python_base
  stage: security
  script:
    - echo "Running Bandit security scanner..."
    - poetry run bandit -r . -f json -o bandit-report.json || true
    - poetry run bandit -r . -f txt
  artifacts:
    reports:
      sast: bandit-report.json
    paths:
      - bandit-report.json
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

security:dependency-check:
  <<: *python_base
  stage: security
  script:
    - echo "Checking dependencies for vulnerabilities..."
    - poetry export -f requirements.txt --without-hashes -o requirements.txt
    - pip install safety
    - safety check --file requirements.txt || true
  artifacts:
    paths:
      - safety-report.json
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

# Deploy Stage (example - customize based on your infrastructure)
deploy:staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying to staging environment..."
    - kubectl apply -f infrastructure/kubernetes/
  environment:
    name: staging
    url: https://staging.stack4things.io
  only:
    - develop
  when: manual

deploy:production:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying to production environment..."
    - kubectl apply -f infrastructure/kubernetes/
  environment:
    name: production
    url: https://stack4things.io
  only:
    - main
  when: manual

