services:
  mysql:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    image: mysql:8.0
    container_name: stack4things-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: stack4things
      MYSQL_USER: stack4things
      MYSQL_PASSWORD: stack4things
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    image: redis:7-alpine
    container_name: stack4things-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: stack4things-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    image: confluentinc/cp-kafka:7.5.0
    container_name: stack4things-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  device-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/device-service
      dockerfile: Dockerfile
    container_name: stack4things-device-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://stack4things:stack4things@mysql:3306/stack4things
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: "true"
      KAFKA_REQUIRED: "false"
      AGENT_BOOTSTRAP_TOKENS: "dev-bootstrap:dev-bootstrap-token:4102444800"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  plugin-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/plugin-service
      dockerfile: Dockerfile
    container_name: stack4things-plugin-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://stack4things:stack4things@mysql:3306/stack4things
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  execution-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/execution-service
      dockerfile: Dockerfile
    container_name: stack4things-execution-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://stack4things:stack4things@mysql:3306/stack4things
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: "true"
      KAFKA_REQUIRED: "false"
      MAX_EXECUTIONS_PER_DEVICE: "32"
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  lightningrod-gateway:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/lightningrod-gateway
      dockerfile: Dockerfile
    container_name: stack4things-lightningrod-gateway
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: "true"
      KAFKA_REQUIRED: "false"
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      SESSION_TTL_SECONDS: "300"
      DISPATCH_TTL_SECONDS: "3600"
    ports:
      - "8007:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  network-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/network-service
      dockerfile: Dockerfile
    container_name: stack4things-network-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://stack4things:stack4things@mysql:3306/stack4things
    ports:
      - "8003:8000"

  dns-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/dns-service
      dockerfile: Dockerfile
    container_name: stack4things-dns-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://stack4things:stack4things@mysql:3306/stack4things
    ports:
      - "8004:8000"

  webservice-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/webservice-service
      dockerfile: Dockerfile
    container_name: stack4things-webservice-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://stack4things:stack4things@mysql:3306/stack4things
    ports:
      - "8005:8000"

  fleet-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/fleet-service
      dockerfile: Dockerfile
    container_name: stack4things-fleet-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://stack4things:stack4things@mysql:3306/stack4things
    ports:
      - "8006:8000"

  nexora-function-runtime:
    profiles: ["dev", "emulator"]
    build:
      context: ./services/nexora-function-runtime
      dockerfile: Dockerfile
    container_name: nexora-function-runtime
    environment:
      RUNTIME_PORT: "9000"
      FUNCTION_INSTALL_DIR: /var/nexora/functions
    volumes:
      - function_artifacts:/var/nexora/functions
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  keycloak:
    profiles: ["auth"]
    image: quay.io/keycloak/keycloak:24.0
    container_name: stack4things-keycloak
    command: ["start-dev", "--http-port=8080"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "18080:8080"

  iotronic-ui:
    profiles: ["ui"]
    env_file:
      - .env.dev
    build:
      context: ./services/iotronic-ui
      dockerfile: Dockerfile
    container_name: stack4things-iotronic-ui
    depends_on:
      device-service:
        condition: service_started
      plugin-service:
        condition: service_started
      execution-service:
        condition: service_started
      network-service:
        condition: service_started
      dns-service:
        condition: service_started
      webservice-service:
        condition: service_started
      fleet-service:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: stack4things
      S4T_DEVICE_URL: http://device-service:8000
      S4T_PLUGIN_URL: http://plugin-service:8000
      S4T_EXECUTION_URL: http://execution-service:8000
      S4T_NETWORK_URL: http://network-service:8000
      S4T_DNS_URL: http://dns-service:8000
      S4T_WEBSERVICE_URL: http://webservice-service:8000
      S4T_FLEET_URL: http://fleet-service:8000
      S4T_TENANT_ID: ${S4T_TENANT_ID:-}
      S4T_AUTH_TOKEN: ${S4T_AUTH_TOKEN:-}
    ports:
      - "18088:8088"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  legacy-keystone:
    profiles: ["legacy"]
    build:
      context: ./services/legacy-keystone
      dockerfile: Dockerfile
    container_name: nexora-legacy-keystone
    environment:
      KEYSTONE_ADMIN_PASSWORD: admin
    volumes:
      - ./services/legacy-keystone/config:/config:ro
      - legacy_keystone_data:/var/lib/keystone
    ports:
      - "15000:5000"

  legacy-horizon:
    profiles: ["legacy"]
    build:
      context: ./services/legacy-horizon
      dockerfile: Dockerfile
    container_name: nexora-legacy-horizon
    depends_on:
      legacy-keystone:
        condition: service_started
    environment:
      S4T_DEVICE_URL: http://device-service:8000
      S4T_PLUGIN_URL: http://plugin-service:8000
      S4T_EXECUTION_URL: http://execution-service:8000
      S4T_NETWORK_URL: http://network-service:8000
      S4T_DNS_URL: http://dns-service:8000
      S4T_WEBSERVICE_URL: http://webservice-service:8000
      S4T_FLEET_URL: http://fleet-service:8000
      S4T_TENANT_ID: ${S4T_TENANT_ID:-}
      S4T_AUTH_TOKEN: ${S4T_AUTH_TOKEN:-}
    volumes:
      - ./tools/iotronic-ui-adapter:/adapter:ro
    ports:
      - "18089:8080"

  lr-board-emulator-1:
    profiles: ["emulator"]
    build:
      context: ./services/lr-board-emulator
      dockerfile: Dockerfile
    container_name: nexora-lr-board-emulator-1
    depends_on:
      device-service:
        condition: service_started
      execution-service:
        condition: service_started
      lightningrod-gateway:
        condition: service_started
    environment:
      DEVICE_URL: http://device-service:8000
      EXEC_URL: http://execution-service:8000
      GW_URL: http://lightningrod-gateway:8000
      RUNTIME_URL: http://nexora-function-runtime:9000
      BOOTSTRAP_TOKEN: dev-bootstrap:dev-bootstrap-token
      BOARD_NAME: lr-board-1
      BOARD_TYPE: lightningrod-emulator
      HEARTBEAT_SECONDS: "10"
      POLL_SECONDS: "4"

  lr-board-emulator-2:
    profiles: ["emulator"]
    build:
      context: ./services/lr-board-emulator
      dockerfile: Dockerfile
    container_name: nexora-lr-board-emulator-2
    depends_on:
      device-service:
        condition: service_started
      execution-service:
        condition: service_started
      lightningrod-gateway:
        condition: service_started
    environment:
      DEVICE_URL: http://device-service:8000
      EXEC_URL: http://execution-service:8000
      GW_URL: http://lightningrod-gateway:8000
      RUNTIME_URL: http://nexora-function-runtime:9000
      BOOTSTRAP_TOKEN: dev-bootstrap:dev-bootstrap-token
      BOARD_NAME: lr-board-2
      BOARD_TYPE: lightningrod-emulator
      HEARTBEAT_SECONDS: "10"
      POLL_SECONDS: "4"

volumes:
  mysql_data:
  redis_data:
  legacy_keystone_data:
  function_artifacts:

