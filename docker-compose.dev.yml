# docker-compose.dev.yml — Nexora Platform local development stack
#
# Usage:
#   docker compose -f docker-compose.dev.yml --profile dev up -d --build
#   docker compose -f docker-compose.dev.yml --profile dev down -v   # teardown
#
# Profiles:
#   dev    — full stack (all microservices + infra)
#   smoke  — lightweight smoke test (infra + core services only)
#   test   — same as smoke; used by CI scripts

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  mysql:
    profiles: ["dev", "test", "smoke"]
    image: mysql:8.0
    container_name: nxr-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nxr
      MYSQL_USER: nxr
      MYSQL_PASSWORD: nxr
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "nxr", "-pnxr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["dev", "test", "smoke"]
    image: redis:7-alpine
    container_name: nxr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    profiles: ["dev", "test", "smoke"]
    image: confluentinc/cp-kafka:7.5.0
    container_name: nxr-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  zookeeper:
    profiles: ["dev", "test", "smoke"]
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nxr-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  jaeger:
    profiles: ["dev", "test", "smoke"]
    image: jaegertracing/all-in-one:1.56
    container_name: nxr-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver

  keycloak:
    profiles: ["dev"]
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: nxr-keycloak
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./infrastructure/keycloak/dev-realm.json:/opt/keycloak/data/import/nexora-dev-realm.json:ro
      - ./infrastructure/keycloak/themes/nexora:/opt/keycloak/themes/nexora:ro
    ports:
      - "18080:8080"

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: nxr-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ---------------------------------------------------------------------------
  # Core microservices
  # ---------------------------------------------------------------------------

  device-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: services/device-service/Dockerfile
    container_name: nxr-device-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  plugin-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: services/plugin-service/Dockerfile
    container_name: nxr-plugin-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  execution-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: services/execution-service/Dockerfile
    container_name: nxr-execution-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  network-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: services/network-service/Dockerfile
    container_name: nxr-network-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  dns-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/dns-service
      dockerfile: Dockerfile
    container_name: nxr-dns-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  webservice-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: services/webservice-service/Dockerfile
    container_name: nxr-webservice-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
    ports:
      - "8005:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  fleet-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: .
      dockerfile: services/fleet-service/Dockerfile
    container_name: nxr-fleet-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
      DEVICE_SERVICE_URL: http://device-service:8000
    ports:
      - "8006:8000"

  ai-pipeline-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/ai-pipeline-service
      dockerfile: Dockerfile
    container_name: nxr-ai-pipeline-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2:1b
      AI_LLM_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8008:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  nexora-ui:
    profiles: ["dev", "smoke"]
    build:
      context: ./services/nexora-ui
      dockerfile: Dockerfile
      args:
        VITE_KEYCLOAK_URL: http://localhost:18080
        VITE_KEYCLOAK_REALM: nxr
        VITE_KEYCLOAK_CLIENT_ID: nexora-ui
        VITE_DEV_AUTH_ENABLED: "false"
    container_name: nxr-nexora-ui
    depends_on:
      keycloak:
        condition: service_started
      device-service:
        condition: service_healthy
      plugin-service:
        condition: service_started
      execution-service:
        condition: service_started
      network-service:
        condition: service_started
      webservice-service:
        condition: service_started
      fleet-service:
        condition: service_started
      ai-pipeline-service:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 5s
      retries: 3

  nexora-function-runtime:
    profiles: ["dev", "emulator"]
    build:
      context: ./services/nexora-function-runtime
      dockerfile: Dockerfile
    container_name: nexora-function-runtime
    environment:
      RUNTIME_PORT: "9000"
      FUNCTION_INSTALL_DIR: /var/nexora/functions
      ARTIFACT_ALLOWED_SCHEMES: "https,http,file"
    volumes:
      - function_artifacts:/var/nexora/functions
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nexora-edge:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/nexora-edge
      dockerfile: Dockerfile
    container_name: nxr-nexora-edge
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "8007:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5


  nexora-device-emulator:
    profiles: ["dev", "emulator"]
    build:
      context: ./services/nexora-device-emulator
      dockerfile: Dockerfile
    container_name: nxr-device-emulator
    depends_on:
      device-service:
        condition: service_healthy
      nexora-edge:
        condition: service_healthy
      execution-service:
        condition: service_healthy
    environment:
      DEVICE_URL: http://device-service:8000
      EXEC_URL: http://execution-service:8000
      GW_URL: http://nexora-edge:8000
      RUNTIME_URL: http://nexora-function-runtime:9000
      BOOTSTRAP_TOKEN: dev-bootstrap:dev-bootstrap-token
      N_BOARDS: "1"
      POLL_SECONDS: "2"
      HEARTBEAT_SECONDS: "10"
      PAIRING_UI_ENABLED: "true"
      PAIRING_UI_PORT: "8091"
    ports:
      - "8091:8091"

volumes:
  mysql_data:
  function_artifacts:
  ollama_data:
