# docker-compose.dev.yml — Nexora Platform local development stack
#
# Usage:
#   docker compose -f docker-compose.dev.yml --profile dev up -d --build
#   docker compose -f docker-compose.dev.yml --profile dev down -v   # teardown
#
# Profiles:
#   dev    — full stack (all microservices + infra)
#   smoke  — lightweight smoke test (infra + core services only)
#   test   — same as smoke; used by CI scripts

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  mysql:
    profiles: ["dev", "test", "smoke"]
    image: mysql:8.0
    container_name: nxr-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nxr
      MYSQL_USER: nxr
      MYSQL_PASSWORD: nxr
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "nxr", "-pnxr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["dev", "test", "smoke"]
    image: redis:7-alpine
    container_name: nxr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    profiles: ["dev", "test", "smoke"]
    image: confluentinc/cp-kafka:7.5.0
    container_name: nxr-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  zookeeper:
    profiles: ["dev", "test", "smoke"]
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nxr-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  jaeger:
    profiles: ["dev", "test", "smoke"]
    image: jaegertracing/all-in-one:1.56
    container_name: nxr-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver

  # ---------------------------------------------------------------------------
  # Core microservices
  # ---------------------------------------------------------------------------

  device-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/device-service
      dockerfile: Dockerfile
    container_name: nxr-device-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  plugin-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/plugin-service
      dockerfile: Dockerfile
    container_name: nxr-plugin-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  execution-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/execution-service
      dockerfile: Dockerfile
    container_name: nxr-execution-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  network-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/network-service
      dockerfile: Dockerfile
    container_name: nxr-network-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  dns-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/dns-service
      dockerfile: Dockerfile
    container_name: nxr-dns-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  webservice-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/webservice-service
      dockerfile: Dockerfile
    container_name: nxr-webservice-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
    ports:
      - "8005:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  fleet-service:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/fleet-service
      dockerfile: Dockerfile
    container_name: nxr-fleet-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://nxr:nxr@mysql:3306/nxr
      DEVICE_SERVICE_URL: http://device-service:8000
    ports:
      - "8006:8000"

  nexora-function-runtime:
    profiles: ["dev", "emulator"]
    build:
      context: ./services/nexora-function-runtime
      dockerfile: Dockerfile
    container_name: nexora-function-runtime
    environment:
      RUNTIME_PORT: "9000"
      FUNCTION_INSTALL_DIR: /var/nexora/functions
    volumes:
      - function_artifacts:/var/nexora/functions
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nexora-edge:
    profiles: ["dev", "test", "smoke"]
    env_file:
      - .env.dev
    build:
      context: ./services/nexora-edge
      dockerfile: Dockerfile
    container_name: nxr-nexora-edge
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "8007:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Legacy / optional services
  # ---------------------------------------------------------------------------

  nexora-dashboard:
    profiles: ["dev"]
    env_file:
      - .env.dev
    build:
      context: ./services/nexora-dashboard
      dockerfile: Dockerfile
    container_name: nxr-nexora-dashboard
    environment:
      S4T_DEVICE_URL: http://device-service:8000
      S4T_PLUGIN_URL: http://plugin-service:8000
      S4T_EXECUTION_URL: http://execution-service:8000
      S4T_NETWORK_URL: http://network-service:8000
      S4T_DNS_URL: http://dns-service:8000
      S4T_WEBSERVICE_URL: http://webservice-service:8000
      S4T_FLEET_URL: http://fleet-service:8000
    ports:
      - "8008:8000"

  legacy-keystone:
    profiles: ["dev"]
    env_file:
      - .env.dev
    build:
      context: ./services/legacy-keystone
      dockerfile: Dockerfile
    container_name: nxr-legacy-keystone
    environment:
      S4T_DEVICE_URL: http://device-service:8000
      S4T_PLUGIN_URL: http://plugin-service:8000
      S4T_EXECUTION_URL: http://execution-service:8000
      S4T_NETWORK_URL: http://network-service:8000
      S4T_DNS_URL: http://dns-service:8000
      S4T_WEBSERVICE_URL: http://webservice-service:8000
      S4T_FLEET_URL: http://fleet-service:8000
    ports:
      - "15000:8000"

  legacy-horizon:
    profiles: ["dev"]
    env_file:
      - .env.dev
    build:
      context: ./services/legacy-horizon
      dockerfile: Dockerfile
    container_name: nxr-legacy-horizon
    ports:
      - "18089:8000"

volumes:
  mysql_data:
  function_artifacts:
