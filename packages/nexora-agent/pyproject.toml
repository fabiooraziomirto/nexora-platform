[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "nexora-agent"
version = "1.0.0"
description = "Nexora IoT edge agent for Linux ARM/x86 devices"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "websockets>=12.0",
]

[project.optional-dependencies]
# Hardware support (Raspberry Pi and compatible Linux SBCs)
hardware = [
    "gpiozero>=2.0",
    "smbus2>=0.4",
    "lgpio>=0.2",          # gpiozero backend for RPi 5 / non-BCM boards
]
# WASM function runtime (requires nexora-runtime sidecar)
runtime = []
# TPM 2.0 credential sealing
tpm = [
    "tpm2-pytss>=2.3",
]
# systemd watchdog integration
systemd = [
    "sdnotify>=0.3",
]
# Full install (all optional features)
full = [
    "nexora-agent[hardware,tpm,systemd]",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.14",
]

[project.scripts]
nexora-agent = "nexora_agent.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
