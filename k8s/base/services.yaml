# Nexora Platform — microservices deployments (k8s/base).
# Services use ClusterIP by default.
# For NodePort on a bare-metal VM apply k8s/nodeport/services.yaml on top.
#
# Images are built locally and loaded into k3s/kind:
#   docker build -f services/device-service/Dockerfile -t nxr/device-service:latest .
#   k3s ctr images import <(docker save nxr/device-service:latest)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-service
  namespace: nxr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: device-service
  template:
    metadata:
      labels:
        app: device-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: device-service
          image: nxr/device-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: mysql+pymysql://nxr:nxr@mysql:3306/nxr
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: KAFKA_ENABLED
              value: "true"
            - name: AUTH_ENABLED
              value: "false"
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: device-service
  namespace: nxr
spec:
  selector:
    app: device-service
  ports:
    - port: 80
      targetPort: 8000

