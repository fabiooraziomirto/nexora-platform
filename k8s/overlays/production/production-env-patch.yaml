apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-service
spec:
  template:
    spec:
      containers:
        - name: device-service
          envFrom:
            - configMapRef:
                name: nexora-production-config
            - secretRef:
                name: nexora-production-secrets
