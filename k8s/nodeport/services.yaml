# NodePort services for Nexora Platform on bare-metal / single-node VM.
# Apply AFTER the base deployments:
#   kubectl apply -f k8s/base/
#   kubectl apply -f k8s/nodeport/services.yaml
#
# Port map (NodePort 30000-30099 range):
#   30000 → device-service    :8000
#   30001 → plugin-service    :8000
#   30002 → execution-service :8000
#   30003 → network-service   :8000
#   30004 → dns-service       :8000
#   30005 → webservice-service:8000
#   30006 → fleet-service     :8000
#   30007 → nexora-edge       :8000
#   30080 → nexora-ui         :80

apiVersion: v1
kind: Service
metadata:
  name: device-service
  namespace: nxr
spec:
  type: NodePort
  selector:
    app: device-service
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30000
      name: http

