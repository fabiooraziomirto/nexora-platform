apiVersion: v1
kind: ConfigMap
metadata:
  name: proxysql-config
  namespace: stack4things-infrastructure
data:
  proxysql.cnf: |
    datadir="/var/lib/proxysql"
    admin_variables=
    {
      admin_credentials="admin:admin"
      mysql_ifaces="0.0.0.0:6032"
      refresh_interval=2000
    }
    mysql_variables=
    {
      threads=4
      max_connections=2048
      default_query_delay=0
      default_query_timeout=36000000
      have_compress=true
      poll_timeout=2000
      interfaces="0.0.0.0:3306"
      default_schema="information_schema"
      stacksize=1048576
      server_version="8.0.0"
      connect_timeout_server=10000
      monitor_history=60000
      monitor_connect_timeout=2000
      monitor_ping_timeout=2000
      ping_timeout_server=200
      commands_stats=true
      sessions_sort=true
    }
    mysql_servers=
    (
      {
        address="mariadb.stack4things-infrastructure.svc.cluster.local"
        port=3306
        hostgroup=0
        max_connections=100
        max_replication_lag=10
        weight=1000
        comment="Primary MySQL server"
      },
      {
        address="mariadb.stack4things-infrastructure.svc.cluster.local"
        port=3306
        hostgroup=1
        max_connections=200
        max_replication_lag=10
        weight=100
        comment="Read replica (for now same as primary)"
      }
    )
    mysql_users=
    (
      {
        username="stack4things"
        password="stack4things"
        default_hostgroup=0
        active=1
        max_connections=1000
        default_transaction_isolation="READ-COMMITTED"
      }
    )
    mysql_query_rules=
    (
      {
        rule_id=1
        active=1
        match_pattern="^SELECT.*FOR UPDATE"
        destination_hostgroup=0
        apply=1
      },
      {
        rule_id=2
        active=1
        match_pattern="^SELECT"
        destination_hostgroup=1
        apply=1
      },
      {
        rule_id=3
        active=1
        match_pattern=".*"
        destination_hostgroup=0
        apply=1
      }
    )

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxysql
  namespace: stack4things-infrastructure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proxysql
  template:
    metadata:
      labels:
        app: proxysql
    spec:
      containers:
      - name: proxysql
        image: proxysql/proxysql:2.5.5
        ports:
        - containerPort: 3306
          name: mysql
        - containerPort: 6032
          name: admin
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb
              key: mariadb-root-password
        volumeMounts:
        - name: config
          mountPath: /etc/proxysql.cnf
          subPath: proxysql.cnf
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: proxysql-config

---
apiVersion: v1
kind: Service
metadata:
  name: proxysql
  namespace: stack4things-infrastructure
spec:
  selector:
    app: proxysql
  ports:
  - port: 3306
    targetPort: 3306
    protocol: TCP
    name: mysql
  - port: 6032
    targetPort: 6032
    protocol: TCP
    name: admin
  type: ClusterIP

