apiVersion: v1
kind: ServiceMonitor
metadata:
  name: mysql-metrics
  namespace: nxr-infrastructure
  labels:
    app: mysql
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mariadb
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: proxysql-metrics
  namespace: nxr-infrastructure
  labels:
    app: proxysql
spec:
  selector:
    matchLabels:
      app: proxysql
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

