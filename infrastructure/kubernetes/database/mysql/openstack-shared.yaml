apiVersion: v1
kind: Secret
metadata:
  name: mysql-openstack-shared
  namespace: nxr-infrastructure
type: Opaque
stringData:
  # Configuration for shared OpenStack MySQL cluster
  # Update these values to match your OpenStack MySQL configuration
  host: "openstack-mysql.example.com"
  port: "3306"
  database: "nxr"
  username: "nxr"
  password: "CHANGE_ME"
  # Connection string format
  # mysql+pymysql://username:password@host:port/database
  connection-string: "mysql+pymysql://nxr:CHANGE_ME@openstack-mysql.example.com:3306/nxr"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-shared-config
  namespace: nxr-infrastructure
data:
  # Instructions for using shared OpenStack MySQL cluster
  README.md: |
    # Using Shared OpenStack MySQL Cluster
    
    ## Prerequisites
    
    1. OpenStack MySQL cluster must be accessible from Kubernetes cluster
    2. Database `nxr` must be created in OpenStack MySQL
    3. User `nxr` must have appropriate permissions
    
    ## Setup
    
    1. Update secret `mysql-openstack-shared` with correct credentials:
       ```bash
       kubectl edit secret mysql-openstack-shared -n nxr-infrastructure
       ```
    
    2. Create database in OpenStack MySQL:
       ```sql
       CREATE DATABASE nxr CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
       CREATE USER 'nxr'@'%' IDENTIFIED BY 'password';
       GRANT ALL PRIVILEGES ON nxr.* TO 'nxr'@'%';
       FLUSH PRIVILEGES;
       ```
    
    3. Update service configuration to use shared MySQL:
       ```yaml
       env:
       - name: DATABASE_URL
         valueFrom:
           secretKeyRef:
             name: mysql-openstack-shared
             key: connection-string
       ```
    
    ## Testing
    
    Run compatibility test:
    ```bash
    MYSQL_HOST=openstack-mysql.example.com \
    MYSQL_USER=nxr \
    MYSQL_PASSWORD=password \
    ./scripts/kubernetes/database/test-openstack-compatibility.sh
    ```

