apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: stack4things-infrastructure
data:
  redis.conf: |
    # Redis configuration for Stack4Things v2.0
    
    # Persistence
    save 900 1
    save 300 10
    save 60 10000
    stop-writes-on-bgsave-error yes
    rdbcompression yes
    rdbchecksum yes
    dbfilename dump.rdb
    dir /data
    
    # AOF (Append Only File)
    appendonly yes
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    
    # Memory management
    maxmemory 4gb
    maxmemory-policy allkeys-lru
    
    # Security
    protected-mode yes
    
    # Performance
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300
    
    # Logging
    loglevel notice
    
    # Replication
    repl-diskless-sync no
    repl-diskless-sync-delay 5

---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: redis-metrics
  namespace: stack4things-infrastructure
  labels:
    app: redis
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

