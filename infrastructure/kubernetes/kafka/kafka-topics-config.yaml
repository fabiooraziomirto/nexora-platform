apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-topics-config
  namespace: stack4things-infrastructure
data:
  topics.yaml: |
    # Base Kafka topics for Stack4Things v2.0
    topics:
      # Device events
      - name: stack4things.device.created
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000  # 7 days
          cleanup.policy: delete
      
      - name: stack4things.device.updated
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: stack4things.device.deleted
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000  # 30 days
          cleanup.policy: delete
      
      - name: stack4things.device.status-changed
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      # Plugin events
      - name: stack4things.plugin.created
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: stack4things.plugin.updated
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: stack4things.plugin.deleted
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      # Execution events
      - name: stack4things.execution.started
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      - name: stack4things.execution.completed
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      - name: stack4things.execution.failed
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      # Network events
      - name: stack4things.network.created
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: stack4things.network.updated
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: stack4things.network.deleted
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      # DNS events
      - name: stack4things.dns.created
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: stack4things.dns.updated
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: stack4things.dns.deleted
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      # Fleet events
      - name: stack4things.fleet.created
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: stack4things.fleet.updated
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: stack4things.fleet.deleted
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      # WAMP events
      - name: stack4things.wamp.connected
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: stack4things.wamp.disconnected
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: stack4things.wamp.message
        partitions: 6
        replication-factor: 3
        config:
          retention.ms: 86400000  # 1 day
          cleanup.policy: delete
      
      # System events
      - name: stack4things.system.health
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 86400000
          cleanup.policy: delete
      
      - name: stack4things.system.metrics
        partitions: 6
        replication-factor: 3
        config:
          retention.ms: 86400000
          cleanup.policy: delete
      
      # Dead letter queue
      - name: stack4things.dlq
        partitions: 6
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete

