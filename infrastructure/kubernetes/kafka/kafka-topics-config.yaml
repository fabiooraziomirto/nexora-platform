apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-topics-config
  namespace: nxr-infrastructure
data:
  topics.yaml: |
    # Base Kafka topics for Nxr v2.0
    topics:
      # Device events
      - name: nxr.device.created
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000  # 7 days
          cleanup.policy: delete
      
      - name: nxr.device.updated
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: nxr.device.deleted
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000  # 30 days
          cleanup.policy: delete
      
      - name: nxr.device.status-changed
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      # Plugin events
      - name: nxr.plugin.created
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: nxr.plugin.updated
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: nxr.plugin.deleted
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      # Execution events
      - name: nxr.execution.started
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      - name: nxr.execution.completed
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      - name: nxr.execution.failed
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      # Network events
      - name: nxr.network.created
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: nxr.network.updated
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: nxr.network.deleted
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      # DNS events
      - name: nxr.dns.created
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: nxr.dns.updated
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: nxr.dns.deleted
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      # Fleet events
      - name: nxr.fleet.created
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: nxr.fleet.updated
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: nxr.fleet.deleted
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete
      
      # WAMP events
      - name: nxr.wamp.connected
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: nxr.wamp.disconnected
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 604800000
          cleanup.policy: delete
      
      - name: nxr.wamp.message
        partitions: 6
        replication-factor: 3
        config:
          retention.ms: 86400000  # 1 day
          cleanup.policy: delete
      
      # System events
      - name: nxr.system.health
        partitions: 3
        replication-factor: 3
        config:
          retention.ms: 86400000
          cleanup.policy: delete
      
      - name: nxr.system.metrics
        partitions: 6
        replication-factor: 3
        config:
          retention.ms: 86400000
          cleanup.policy: delete
      
      # Dead letter queue
      - name: nxr.dlq
        partitions: 6
        replication-factor: 3
        config:
          retention.ms: 2592000000
          cleanup.policy: delete

