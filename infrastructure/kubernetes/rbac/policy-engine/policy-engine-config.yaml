apiVersion: v1
kind: ConfigMap
metadata:
  name: policy-engine-config
  namespace: stack4things
data:
  engine-config.yaml: |
    # Policy Engine Configuration
    
    engine:
      type: oslo.policy
      cache_enabled: true
      cache_ttl: 3600
      
    evaluation:
      strict: false
      default_rule: "rule:default"
      
    logging:
      level: INFO
      format: json

