apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audit-logs-storage
  namespace: nxr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-config
  namespace: nxr
data:
  audit-config.yaml: |
    # Audit logging configuration
    
    audit:
      enabled: true
      format: json
      destination: file
      file_path: /var/log/audit/access.log
      rotation:
        max_size: 100MB
        max_files: 10
        compress: true
      
    events:
      - access_denied
      - access_granted
      - role_assigned
      - role_revoked
      - policy_updated
      - resource_created
      - resource_updated
      - resource_deleted
      
    fields:
      - timestamp
      - user_id
      - user_name
      - role
      - action
      - resource_type
      - resource_id
      - result
      - ip_address
      - user_agent
      
    retention:
      days: 90
      archive: true

