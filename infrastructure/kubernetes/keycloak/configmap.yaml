apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: nxr
data:
  realm.json: |
    {
      "realm": "nxr",
      "enabled": true,
      "displayName": "Nxr",
      "clients": [
        {
          "clientId": "device-service",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": true
        },
        {
          "clientId": "api-gateway",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": true
        }
      ],
      "roles": {
        "realm": [
          {
            "name": "admin",
            "description": "Full access to all resources"
          },
          {
            "name": "device-manager",
            "description": "Manage devices"
          },
          {
            "name": "device-viewer",
            "description": "View devices only"
          },
          {
            "name": "plugin-manager",
            "description": "Manage plugins"
          },
          {
            "name": "execution-manager",
            "description": "Execute commands"
          }
        ]
      },
      "identityProviders": [
        {
          "alias": "keystone",
          "providerId": "keycloak-oidc",
          "enabled": true,
          "config": {
            "clientId": "nxr-client",
            "authorizationUrl": "https://keystone.example.com/v3/OS-FEDERATION/identity_providers/keystone/protocols/openid/authorize",
            "tokenUrl": "https://keystone.example.com/v3/OS-FEDERATION/identity_providers/keystone/protocols/openid/token"
          }
        }
      ]
    }

