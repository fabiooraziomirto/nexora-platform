apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-keycloak-oidc
  namespace: stack4things
data:
  kong.yaml: |
    _format_version: "3.0"
    
    plugins:
    - name: oidc
      config:
        client_id: api-gateway
        client_secret: ${KEYCLOAK_CLIENT_SECRET}
        discovery: http://keycloak.stack4things-auth.svc.cluster.local:8080/realms/stack4things/.well-known/openid-configuration
        introspection_endpoint: http://keycloak.stack4things-auth.svc.cluster.local:8080/realms/stack4things/protocol/openid-connect/token/introspect
        introspection_endpoint_auth_method: client_secret_post
        bearer_only: "no"
        realm: stack4things
        redirect_after_logout_uri: /
        session_secret: ${SESSION_SECRET}
        logout_path: /logout
        filters:
        - http://device-service.stack4things.svc.cluster.local
        - http://plugin-service.stack4things.svc.cluster.local
        scopes:
        - openid
        - profile
        - email
        - roles

