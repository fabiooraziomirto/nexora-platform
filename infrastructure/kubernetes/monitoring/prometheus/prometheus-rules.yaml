apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: stack4things-alerts
  namespace: stack4things-monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: stack4things.rules
      interval: 30s
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (service) 
            / 
            sum(rate(http_requests_total[5m])) by (service) 
            > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate detected"
            description: "Service {{ $labels.service }} has error rate above 5%"

        - alert: HighLatency
          expr: |
            histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High latency detected"
            description: "Service {{ $labels.service }} has p95 latency above 1s"

        - alert: ServiceDown
          expr: |
            up{job=~"stack4things.*"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Service is down"
            description: "Service {{ $labels.job }} is down"

        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="stack4things"}[5m])) by (pod) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage"
            description: "Pod {{ $labels.pod }} has CPU usage above 80%"

        - alert: HighMemoryUsage
          expr: |
            sum(container_memory_working_set_bytes{namespace="stack4things"}) by (pod) 
            / 
            sum(container_spec_memory_limit_bytes{namespace="stack4things"}) by (pod) 
            > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage"
            description: "Pod {{ $labels.pod }} has memory usage above 90%"

