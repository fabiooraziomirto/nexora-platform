apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: stack4things-monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      # Configure SMTP for email notifications
      # smtp_smarthost: 'smtp.example.com:587'
      # smtp_from: 'alerts@stack4things.io'
    
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'
        - match:
            severity: warning
          receiver: 'warning-alerts'
    
    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://localhost:5001/webhook'
            send_resolved: true
      
      - name: 'critical-alerts'
        webhook_configs:
          - url: 'http://localhost:5001/webhook'
            send_resolved: true
        # email_configs:
        #   - to: 'ops-team@stack4things.io'
        #     subject: 'CRITICAL: {{ .GroupLabels.alertname }}'
      
      - name: 'warning-alerts'
        webhook_configs:
          - url: 'http://localhost:5001/webhook'
            send_resolved: true

