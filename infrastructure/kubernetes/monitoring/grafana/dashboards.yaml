apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-stack4things
  namespace: stack4things-monitoring
  labels:
    grafana_dashboard: "1"
data:
  stack4things-overview.json: |
    {
      "dashboard": {
        "title": "Stack4Things Overview",
        "tags": ["stack4things"],
        "timezone": "browser",
        "schemaVersion": 27,
        "version": 1,
        "refresh": "30s",
        "panels": [
          {
            "id": 1,
            "title": "Request Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(http_requests_total[5m]))",
                "legendFormat": "{{service}}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Error Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m]))",
                "legendFormat": "{{service}}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
          },
          {
            "id": 3,
            "title": "Latency (p95)",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))",
                "legendFormat": "p95 {{service}}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
          },
          {
            "id": 4,
            "title": "Active Devices",
            "type": "stat",
            "targets": [
              {
                "expr": "active_devices_total",
                "legendFormat": "Active Devices"
              }
            ],
            "gridPos": {"h": 4, "w": 6, "x": 12, "y": 8}
          }
        ]
      }
    }

