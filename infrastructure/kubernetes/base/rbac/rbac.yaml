apiVersion: v1
kind: ServiceAccount
metadata:
  name: nxr-admin
  namespace: nxr
  labels:
    app: nxr
    component: admin

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nxr-admin
  labels:
    app: nxr
rules:
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["cert-manager.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["*"]
    verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nxr-admin-binding
  labels:
    app: nxr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nxr-admin
subjects:
  - kind: ServiceAccount
    name: nxr-admin
    namespace: nxr

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nxr-developer
  namespace: nxr
  labels:
    app: nxr
    component: developer

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nxr-developer
  namespace: nxr
  labels:
    app: nxr
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nxr-developer-binding
  namespace: nxr
  labels:
    app: nxr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nxr-developer
subjects:
  - kind: ServiceAccount
    name: nxr-developer
    namespace: nxr

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nxr-readonly
  namespace: nxr
  labels:
    app: nxr
    component: readonly

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nxr-readonly
  namespace: nxr
  labels:
    app: nxr
rules:
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nxr-readonly-binding
  namespace: nxr
  labels:
    app: nxr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nxr-readonly
subjects:
  - kind: ServiceAccount
    name: nxr-readonly
    namespace: nxr

