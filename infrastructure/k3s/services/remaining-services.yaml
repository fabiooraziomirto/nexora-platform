# plugin-service (8001), fleet-service (8006), nexora-edge (8007)
# Pattern is identical to device-service — only name, image, and port differ.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plugin-service
  namespace: nxr
  labels:
    app: plugin-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: plugin-service
  template:
    metadata:
      labels:
        app: plugin-service
    spec:
      serviceAccountName: nexora-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: plugin-service
          image: nexora/plugin-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: nexora-config
            - secretRef:
                name: nexora-internal
            - secretRef:
                name: nexora-db
          env:
            - name: PORT
              value: "8001"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: plugin-service
  namespace: nxr
spec:
  selector:
    app: plugin-service
  ports:
    - port: 8001
      targetPort: 8001
---
