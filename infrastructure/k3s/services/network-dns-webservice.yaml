# network-service (8003), dns-service (8004), webservice-service (8005)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-service
  namespace: nxr
  labels:
    app: network-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-service
  template:
    metadata:
      labels:
        app: network-service
    spec:
      serviceAccountName: nexora-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: network-service
          image: nexora/network-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: nexora-config
            - secretRef:
                name: nexora-internal
            - secretRef:
                name: nexora-db
          env:
            - name: PORT
              value: "8003"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: network-service
  namespace: nxr
spec:
  selector:
    app: network-service
  ports:
    - port: 8003
      targetPort: 8003
