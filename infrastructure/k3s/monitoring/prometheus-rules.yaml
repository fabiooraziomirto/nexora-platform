apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: nxr-monitoring
data:
  nexora-alerts.yml: |
    groups:
      - name: nexora.availability
        interval: 30s
        rules:
          - alert: ServiceDown
            expr: up{job="nexora-services"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Nexora service {{ $labels.instance }} is down"
              runbook: "kubectl get pods -n nxr | grep {{ $labels.instance }}"

          - alert: ServiceHighRestarts
            expr: |
              increase(kube_pod_container_status_restarts_total{namespace="nxr"}[15m]) > 3
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} restarted {{ $value }} times in 15m"

      - name: nexora.api
        interval: 30s
        rules:
          - alert: HighErrorRate
            expr: |
              sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
              /
              sum(rate(http_requests_total[5m])) by (job)
              > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.job }} error rate above 5% ({{ $value | humanizePercentage }})"

          - alert: CriticalErrorRate
            expr: |
              sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
              /
              sum(rate(http_requests_total[5m])) by (job)
              > 0.20
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.job }} error rate above 20% — SLO breach"

          - alert: HighLatencyP95
            expr: |
              histogram_quantile(0.95,
                sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)
              ) > 1.0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.job }} p95 latency above 1s"

          - alert: SLOLatencyBreach
            expr: |
              histogram_quantile(0.95,
                sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)
              ) > 0.7
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.job }} p95 latency SLO breach (>700ms for 10m)"

      - name: nexora.resources
        interval: 60s
        rules:
          - alert: HighMemoryUsage
            expr: |
              sum(container_memory_working_set_bytes{namespace="nxr"}) by (pod)
              /
              sum(container_spec_memory_limit_bytes{namespace="nxr"} > 0) by (pod)
              > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} memory usage above 90%"

          - alert: HighCPUUsage
            expr: |
              sum(rate(container_cpu_usage_seconds_total{namespace="nxr"}[5m])) by (pod) > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} CPU above 80%"

          - alert: PVCAlmostFull
            expr: |
              kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"

      - name: nexora.iot
        interval: 60s
        rules:
          - alert: KafkaConsumerLag
            expr: |
              sum(kafka_consumer_group_lag{namespace="nxr"}) by (group, topic) > 1000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Kafka consumer {{ $labels.group }} lag > 1000 on {{ $labels.topic }}"

          - alert: ExecutionBacklog
            expr: |
              sum(rate(http_requests_total{job="nexora-services",instance=~"execution.*",status="202"}[5m])) > 50
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Execution service processing >50 dispatches/s for 10m — possible backlog"

          - alert: DeviceTelemetryGap
            expr: |
              time() - max(nexora_device_telemetry_last_received_timestamp) by (device_id) > 300
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Device {{ $labels.device_id }} has not sent telemetry for >5m"

      - name: nexora.infrastructure
        interval: 60s
        rules:
          - alert: MySQLDown
            expr: mysql_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "MySQL is down"

          - alert: KafkaDown
            expr: kafka_brokers == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Kafka has no available brokers"

          - alert: BackupMissing
            expr: |
              time() - nexora_backup_last_success_timestamp > 90000
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "MySQL backup has not run in more than 25 hours"
