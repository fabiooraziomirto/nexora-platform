apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: nxr-monitoring
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: "smtp.example.com:587"
      smtp_from: "nexora-alerts@example.com"
      smtp_auth_username: "nexora-alerts@example.com"
      smtp_auth_password: "REPLACE_WITH_SMTP_PASSWORD"

    route:
      group_by: ["alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: default
      routes:
        - matchers:
            - severity="critical"
          receiver: critical
          repeat_interval: 1h
        - matchers:
            - severity="warning"
          receiver: default
          repeat_interval: 6h

    receivers:
      - name: default
        webhook_configs:
          - url: "http://localhost:5001/alerts"
            send_resolved: true

      - name: critical
        webhook_configs:
          - url: "http://localhost:5001/alerts"
            send_resolved: true
        # Uncomment and configure for email alerts:
        # email_configs:
        #   - to: "ops@example.com"
        #     send_resolved: true

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ["alertname"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: nxr-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      securityContext:
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--web.external-url=http://alertmanager:9093"
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "100m"
      volumes:
        - name: config
          secret:
            secretName: alertmanager-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: nxr-monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
