apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-data
  namespace: keycloak
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: local-path  # override via --storage-class in install.sh
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: keycloak
data:
  realm.json: |
    {
      "realm": "nxr",
      "enabled": true,
      "displayName": "Nexora",
      "loginTheme": "nexora",
      "sslRequired": "external",
      "registrationAllowed": false,
      "bruteForceProtected": true,
      "failureFactor": 30,
      "clients": [
        {
          "clientId": "nexora-api",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": true,
          "redirectUris": ["*"],
          "webOrigins": ["*"]
        },
        {
          "clientId": "nexora-ui",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "redirectUris": ["*"],
          "webOrigins": ["*"]
        }
      ],
      "roles": {
        "realm": [
          {"name": "platform-admin", "description": "Full platform access"},
          {"name": "tenant-admin",   "description": "Manage own tenant resources"},
          {"name": "operator",       "description": "Execute commands, view all"},
          {"name": "viewer",         "description": "Read-only access"}
        ]
      },
      "users": [
        {
          "username": "admin",
          "enabled": true,
          "credentials": [{"type": "password", "value": "changeme", "temporary": true}],
          "realmRoles": ["platform-admin"]
        }
      ],
      "accessTokenLifespan": 3600,
      "ssoSessionIdleTimeout": 1800,
      "ssoSessionMaxLifespan": 36000,
      "offlineSessionIdleTimeout": 2592000
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  serviceName: keycloak
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: copy-realm
          image: busybox
          command:
            - sh
            - -c
            - |
              cp /realm-config/realm.json /opt/keycloak/data/import/realm.json
              mkdir -p /opt/keycloak/themes/nexora/login/resources/css \
                       /opt/keycloak/themes/nexora/login/resources/img \
                       /opt/keycloak/themes/nexora/login/messages
              cp /theme-config/theme.properties    /opt/keycloak/themes/nexora/login/theme.properties
              cp /theme-config/messages_en.properties /opt/keycloak/themes/nexora/login/messages/messages_en.properties
              cp /theme-config/login.css           /opt/keycloak/themes/nexora/login/resources/css/login.css
              cp /theme-config/nexora-mark.svg     /opt/keycloak/themes/nexora/login/resources/img/nexora-mark.svg
          volumeMounts:
            - name: realm-config
              mountPath: /realm-config
            - name: theme-config
              mountPath: /theme-config
            - name: keycloak-data
              mountPath: /opt/keycloak/data
            - name: keycloak-themes
              mountPath: /opt/keycloak/themes
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:23.0
          args: ["start", "--import-realm", "--optimized"]
          env:
            - name: KC_DB
              value: dev-file  # file-based H2 for single-node self-hosted
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_PROXY
              value: edge
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexora-keycloak
                  key: KEYCLOAK_ADMIN_PASSWORD
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: keycloak-data
              mountPath: /opt/keycloak/data
            - name: keycloak-themes
              mountPath: /opt/keycloak/themes
          readinessProbe:
            httpGet:
              path: /realms/nxr
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm
        - name: theme-config
          configMap:
            name: keycloak-nexora-theme
        - name: keycloak-themes
          emptyDir: {}
        - name: keycloak-data
          persistentVolumeClaim:
            claimName: keycloak-data
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
