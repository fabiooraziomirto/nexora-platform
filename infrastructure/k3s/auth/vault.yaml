apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-data
  namespace: nxr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  # storageClassName: local-path  # override via --storage-class in install.sh
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: nxr
data:
  vault.hcl: |
    storage "file" {
      path = "/vault/data"
    }
    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = 1
    }
    ui           = true
    api_addr     = "http://0.0.0.0:8200"
    disable_mlock = true
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: nxr
  labels:
    app: vault
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      securityContext:
        runAsUser: 100
        fsGroup: 1000
        capabilities:
          drop: ["ALL"]
      containers:
        - name: vault
          image: hashicorp/vault:1.15
          args: ["server", "-config=/vault/config/vault.hcl"]
          env:
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
            - name: VAULT_API_ADDR
              value: "http://0.0.0.0:8200"
          ports:
            - name: http
              containerPort: 8200
            - name: cluster
              containerPort: 8201
          volumeMounts:
            - name: vault-config
              mountPath: /vault/config
            - name: vault-data
              mountPath: /vault/data
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&uninitcode=204
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
      volumes:
        - name: vault-config
          configMap:
            name: vault-config
        - name: vault-data
          persistentVolumeClaim:
            claimName: vault-data
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: nxr
spec:
  selector:
    app: vault
  ports:
    - name: http
      port: 8200
      targetPort: 8200
