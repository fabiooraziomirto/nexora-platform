apiVersion: database.nxr.io/v1alpha1
kind: DatabaseClaim
metadata:
  name: nxr-database
  namespace: nxr-infrastructure
spec:
  parameters:
    storageGB: 20
    instanceClass: db-f1-micro
    region: us-central1

---
apiVersion: cache.nxr.io/v1alpha1
kind: CacheClaim
metadata:
  name: nxr-redis
  namespace: nxr-infrastructure
spec:
  parameters:
    memoryGB: 1
    region: us-central1

---
apiVersion: messaging.nxr.io/v1alpha1
kind: MessagingClaim
metadata:
  name: nxr-kafka
  namespace: nxr-infrastructure
spec:
  parameters:
    clusterSize: 3
    storageGB: 20
    region: us-central1

---
apiVersion: storage.nxr.io/v1alpha1
kind: StorageClaim
metadata:
  name: nxr-storage
  namespace: nxr-infrastructure
spec:
  parameters:
    storageGB: 100
    region: us-central1
    storageClass: STANDARD

---
apiVersion: loadbalancer.nxr.io/v1alpha1
kind: LoadBalancerClaim
metadata:
  name: nxr-lb
  namespace: nxr
spec:
  parameters:
    type: EXTERNAL
    region: us-central1

