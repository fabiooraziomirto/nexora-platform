apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xstacks.database.stack4things.io
spec:
  group: database.stack4things.io
  names:
    kind: XStackDatabase
    plural: xstacks
  claimNames:
    kind: DatabaseClaim
    plural: databaseclaims
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              parameters:
                type: object
                properties:
                  storageGB:
                    type: integer
                    default: 20
                  instanceClass:
                    type: string
                    default: db-f1-micro
                  region:
                    type: string
                    default: us-central1
            required:
            - parameters

